<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>

  <meta content="#0f0b14" name="theme-color"/>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0f0b14;color:#f2eef8;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{text-align:center}
    .spinner{width:40px;height:40px;border:3px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{margin:0;color:#a89cc4}
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" aria-hidden="true"></div>
    <p>Telegramga yo'naltirilmoqda...</p>
  </div>
  <script>
(function(){
  function randomId(){
    var s = '';
    for (var i = 0; i < 16; i++) s += Math.floor(Math.random() * 10);
    return s;
  }
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id') || '';
  if (!id) {
    try { id = sessionStorage.getItem('attribution_id') || ''; if (id) sessionStorage.removeItem('attribution_id'); } catch (e) {}
  }
  if (!id) id = randomId();
  window.location.replace('https://t.me/ieltscore_official_bot?start=' + id);
})();
  </script>
